# .github/labview-ci.yml - LabVIEW CI configuration
# Updated by the Reconfigure workflow.
schemaVersion: 1
installedVersion: 4.2.0
configuredAt: 2026-06-27T17:39:55Z
source:
  repo: elijah286/LabVIEW-CI-with-Containers
  ref: v4.2.0
config:
  labviewVersion: "2026"
  os: [windows, linux]
  concurrency:
    maxParallel: 5
  container:
    use: latest
activities:
  - dashboard
  - masscompile
  - vi-analyzer
  - vidiff
  - snapshots
  - custom-image
  - snapshots-2
  - unit-tests

unitTests:
  thresholds:
    passedPercent:
      greenAtLeast: 100
      yellowAtLeast: 80
      redBelow: 80
  tools:
    caraya:
      enabled: false
      locations: []
    lunit:
      enabled: true
      locations:
        - "tests\Coffee Shop\Tests"
    vi-tester:
      enabled: false
      locations: []
    utf:
      enabled: false
      locations: []
